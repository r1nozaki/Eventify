version: '3.9'

services:
  db:
    image: postgres:15
    container_name: event-db
    restart: always
    environment:
      POSTGRES_DB: eventdb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data

  api:
    build: .
    container_name: event-api
    depends_on:
      - db
    ports:
      - '5000:8080'
    environment:
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__Default: Host=db;Port=5432;Database=eventdb;Username=postgres;Password=postgres

volumes:
  postgres_data:
